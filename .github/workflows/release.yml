name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test -v ./...

      - name: Build arm64
        run: CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build -o clipsync-darwin-arm64 .

      - name: Build amd64
        run: CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 go build -o clipsync-darwin-amd64 .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            clipsync-darwin-arm64
            clipsync-darwin-amd64
          generate_release_notes: true
